<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模组搜索 | MC-JE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mc-green: #4CAF50; --bg-color: #121212; --card-bg: #1e1e1e;
            --text-main: #ffffff; --text-sub: #b0b0b0; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; font-size: 16px; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }

        nav { position: fixed; top: 0; width: 100%; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: bold; color: var(--mc-green); }
        .back-link { color: var(--text-sub); font-size: 0.85rem; }
        .back-link:hover { color: var(--mc-green); }

        header { padding: 7rem 1.5rem 2rem; text-align: center; background: linear-gradient(to bottom, #1a1a1a, var(--bg-color)); }
        header h1 { font-size: clamp(1.5rem, 3vw, 2rem); margin-bottom: 1.5rem; }

        .search-container { max-width: 700px; margin: 0 auto; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 12px 20px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--mc-green); }
        .search-btn { padding: 12px 25px; background: var(--mc-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .search-btn:hover { opacity: 0.9; }

        .filters { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .filter-tag { padding: 5px 12px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); font-size: 0.8rem; cursor: pointer; transition: 0.3s; user-select: none; }
        .filter-tag.active, .filter-tag:hover { background: var(--mc-green); border-color: var(--mc-green); color: white; }

        .results-info { text-align: center; padding: 1rem 5%; color: var(--text-sub); font-size: 0.9rem; }

        section { padding: 2rem 8%; }
        .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; min-height: 200px; }
        .res-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .res-img { height: 140px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
        .res-img img { width: 100%; height: 100%; object-fit: contain; padding: 15px; }
        .res-content { padding: 1rem; flex-grow: 1; display: flex; flex-direction: column; }
        .tag { display: inline-block; padding: 2px 8px; font-size: 0.7rem; border-radius: 4px; margin-bottom: 0.4rem; width: fit-content; background: var(--mc-green); color: white; }
        .res-title { font-size: 1rem; margin-bottom: 0.3rem; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .downloads { font-size: 0.7rem; color: var(--text-sub); white-space: nowrap; }
        .res-desc { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 0.8rem; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .download-btn { display: block; text-align: center; background: #333; padding: 8px; border-radius: 5px; color: white; font-size: 0.8rem; margin-top: auto; }
        .download-btn:hover { background: var(--mc-green); }

        .status-msg { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-sub); }
        .status-msg.error { color: #e74c3c; }

        /* 分页导航样式 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; padding: 2rem 0; flex-wrap: wrap; }
        .page-btn {
            min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg);
            color: var(--text-sub); cursor: pointer; font-size: 0.9rem; transition: 0.3s; user-select: none;
        }
        .page-btn:hover:not(.active):not(.disabled) { border-color: var(--mc-green); color: var(--mc-green); }
        .page-btn.active { background: var(--mc-green); border-color: var(--mc-green); color: white; font-weight: bold; }
        .page-btn.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .page-ellipsis { color: var(--text-sub); padding: 0 0.3rem; user-select: none; }

        @media (max-width: 768px) {
            header { padding: 5.5rem 1rem 1.5rem; }
            section { padding: 1.5rem 4%; }
            .resource-grid { grid-template-columns: 1fr; gap: 1rem; }
            .search-input { min-width: 100%; }
            .search-btn { width: 100%; }
            .page-btn { min-width: 36px; height: 36px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fa-solid fa-cube"></i> MC-JE HUB</div>
    <!-- ✨ 返回介绍站链接，按需修改 -->
    <a href="./index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
</nav>

<header>
    <h1><i class="fa-brands fa-modrinth" style="color:var(--mc-green)"></i> Modrinth 模组搜索</h1>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="输入模组名称或关键词..." autocomplete="off">
        <button id="searchBtn" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i> 搜索</button>
    </div>
    <div class="filters" id="filterContainer">
        <span class="filter-tag active" data-loader="all">全部</span>
        <span class="filter-tag" data-loader="fabric">Fabric</span>
        <span class="filter-tag" data-loader="forge">Forge</span>
        <span class="filter-tag" data-loader="neoforge">NeoForge</span>
        <span class="filter-tag" data-loader="quilt">Quilt</span>
    </div>
</header>

<div class="results-info" id="resultsInfo"></div>

<section>
    <div id="modContainer" class="resource-grid">
        <div class="status-msg"><i class="fa-solid fa-keyboard"></i><br>输入关键词开始搜索模组</div>
    </div>
</section>

<div id="pagination" class="pagination"></div>

<footer style="background:#0a0a0a; padding:2rem; text-align:center; color:var(--text-sub); font-size:0.8rem; border-top:1px solid var(--border);">
    <p>&copy; 2026 MC-JE HUB. Powered by Modrinth Search API.</p>
</footer>

<script>
const RESULTS_PER_PAGE = 12;

// ===================== 状态管理 =====================
const state = {
    query: '',
    loader: 'all',
    currentPage: 1,
    totalHits: 0,
    isLoading: false
};

const els = {
    input: document.getElementById('searchInput'),
    searchBtn: document.getElementById('searchBtn'),
    filters: document.getElementById('filterContainer'),
    container: document.getElementById('modContainer'),
    info: document.getElementById('resultsInfo'),
    pagination: document.getElementById('pagination')
};

// ===================== 工具函数 =====================
function formatNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function createCard(mod) {
    const icon = mod.icon_url || 'https://cdn.modrinth.com/placeholder.png';
    const url = `https://modrinth.com/mod/${mod.slug}`;
    const cat = mod.categories?.[0] || 'Mod';
    return `
        <div class="res-card">
            <div class="res-img">
                <img src="${icon}" alt="${escapeHtml(mod.title)}" loading="lazy"
                     onerror="this.src='https://cdn.modrinth.com/placeholder.png'">
            </div>
            <div class="res-content">
                <span class="tag">${escapeHtml(cat)}</span>
                <h3 class="res-title">
                    <span>${escapeHtml(mod.title)}</span>
                    <span class="downloads"><i class="fa-solid fa-download"></i> ${formatNum(mod.downloads)}</span>
                </h3>
                <p class="res-desc">${escapeHtml(mod.description)}</p>
                <a href="${url}" target="_blank" rel="noopener" class="download-btn">
                    <i class="fa-brands fa-modrinth"></i> 查看详情
                </a>
            </div>
        </div>`;
}

function generatePageNumbers(current, total) {
    const pages = [];
    if (total <= 7) {
        for (let i = 1; i <= total; i++) pages.push(i);
    } else {
        pages.push(1);
        if (current > 3) pages.push('...');
        const start = Math.max(2, current - 1);
        const end = Math.min(total - 1, current + 1);
        for (let i = start; i <= end; i++) pages.push(i);
        if (current < total - 2) pages.push('...');
        pages.push(total);
    }
    return pages;
}

function renderPagination() {
    const totalPages = Math.ceil(state.totalHits / RESULTS_PER_PAGE);
    if (totalPages <= 1) { els.pagination.innerHTML = ''; return; }

    const pages = generatePageNumbers(state.currentPage, totalPages);
    let html = `<div class="page-btn ${state.currentPage === 1 ? 'disabled' : ''}" data-page="${state.currentPage - 1}"><i class="fa-solid fa-chevron-left"></i></div>`;

    for (const p of pages) {
        if (p === '...') {
            html += '<span class="page-ellipsis">…</span>';
        } else {
            html += `<div class="page-btn ${p === state.currentPage ? 'active' : ''}" data-page="${p}">${p}</div>`;
        }
    }

    html += `<div class="page-btn ${state.currentPage === totalPages ? 'disabled' : ''}" data-page="${state.currentPage + 1}"><i class="fa-solid fa-chevron-right"></i></div>`;
    els.pagination.innerHTML = html;
}

// ===================== 核心搜索逻辑 =====================
async function searchMods() {
    if (state.isLoading) return;
    if (!state.query.trim()) {
        els.container.innerHTML = '<div class="status-msg"><i class="fa-solid fa-keyboard"></i><br>输入关键词开始搜索模组</div>';
        els.info.textContent = '';
        els.pagination.innerHTML = '';
        return;
    }

    state.isLoading = true;
    els.container.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> 搜索中...</div>';
    els.pagination.innerHTML = '';

    try {
        let facets = '[["project_type:mod"]]';
        if (state.loader !== 'all') {
            facets = `[["project_type:mod"],["categories:${state.loader}"]]`;
        }

        const params = new URLSearchParams({
            query: state.query,
            limit: RESULTS_PER_PAGE,
            offset: (state.currentPage - 1) * RESULTS_PER_PAGE,
            index: 'relevance',
            facets: facets
        });

        const res = await fetch(`https://api.modrinth.com/v2/search?${params}`);
        if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);

        const data = await res.json();
        state.totalHits = data.total_hits;
        els.container.innerHTML = '';

        if (data.hits.length === 0) {
            els.container.innerHTML = '<div class="status-msg error"><i class="fa-solid fa-face-sad-tear"></i><br>未找到相关模组，换个关键词试试？</div>';
            els.info.textContent = '';
            els.pagination.innerHTML = '';
        } else {
            els.container.innerHTML = data.hits.map(createCard).join('');
            const start = (state.currentPage - 1) * RESULTS_PER_PAGE + 1;
            const end = Math.min(state.currentPage * RESULTS_PER_PAGE, state.totalHits);
            els.info.textContent = `共 ${formatNum(state.totalHits)} 个模组，当前显示第 ${start}-${end} 个`;
            renderPagination();
            window.scrollTo({ top: els.container.offsetTop - 100, behavior: 'smooth' });
        }
    } catch (err) {
        console.error(err);
        els.container.innerHTML = `<div class="status-msg error"><i class="fa-solid fa-triangle-exclamation"></i><br>搜索失败: ${escapeHtml(err.message)}</div>`;
        els.pagination.innerHTML = '';
    } finally {
        state.isLoading = false;
    }
}

// ===================== 事件绑定 =====================
function triggerSearch() {
    state.query = els.input.value;
    state.currentPage = 1;
    searchMods();
}

els.searchBtn.addEventListener('click', triggerSearch);
els.input.addEventListener('keydown', e => { if (e.key === 'Enter') triggerSearch(); });

let debounceTimer;
els.input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(triggerSearch, 600);
});

els.filters.addEventListener('click', e => {
    const tag = e.target.closest('.filter-tag');
    if (!tag) return;
    els.filters.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    state.loader = tag.dataset.loader;
    state.currentPage = 1;
    if (state.query.trim()) searchMods();
});

els.pagination.addEventListener('click', e => {
    const btn = e.target.closest('.page-btn');
    if (!btn || btn.classList.contains('active') || btn.classList.contains('disabled')) return;
    const page = parseInt(btn.dataset.page, 10);
    const totalPages = Math.ceil(state.totalHits / RESULTS_PER_PAGE);
    if (isNaN(page) || page < 1 || page > totalPages) return;
    state.currentPage = page;
    searchMods();
});

// ✨ 页面加载时自动读取 URL 参数并触发搜索
(function initFromURL() {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q');
    if (query) {
        els.input.value = query;
        state.query = query;
        state.currentPage = 1;
        searchMods();
    }
})();
</script>
</body>
</html>
