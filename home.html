<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能主站 | 深色模式</title>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式 - 深色模式 + 自适应字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
        }

        :root {
            --bg-main: #121218;
            --bg-card: #1e1e2f;
            --bg-hover: #2d2d44;
            --text-primary: #f0f0f8;
            --text-secondary: #a9a9c2;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --border: #33334d;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 12px;
            /* 修复：补上s单位 */
            --transition: all 0.3s ease;
            --base-font: 14px;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            /* 优化全局字体：缩小上下限，大小更均衡 */
            font-size: clamp(14px, 0.95vw, 15.5px);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* 顶部导航栏 */
        .header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 99;
            box-shadow: var(--shadow);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            /* 优化logo字体区间 */
            font-size: clamp(1.05rem, 1.3vw, 1.25rem);
            font-weight: 700;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .nav-menu {
            display: flex;
            gap: 1.2rem;
        }
        .nav-item a {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: var(--transition);
            color: var(--text-secondary);
            /* 优化导航字体大小 */
            font-size: clamp(13px, 0.85vw, 14px);
        }
        .nav-item a:hover, .nav-item a.active {
            background-color: var(--bg-hover);
            color: var(--accent-light);
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 2rem;
        }
        .page-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .page-title h1 {
            /* 优化大标题缩放 */
            font-size: clamp(1.5rem, 2.2vw, 1.9rem);
            margin-bottom: 0.4rem;
        }
        .page-title p {
            color: var(--text-secondary);
            font-size: clamp(13px, 0.85vw, 14px);
        }

        /* 功能卡片网格 */
        .func-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 3rem;
        }
        .func-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem 1rem;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }
        .func-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
            background-color: var(--bg-hover);
        }
        .func-icon {
            font-size: clamp(2rem, 2.8vw, 2.2rem);
            color: var(--accent-light);
            margin-bottom: 0.8rem;
        }
        .func-card h3 {
            /* 优化卡片标题字号 */
            font-size: clamp(14.5px, 1vw, 16px);
            margin-bottom: 0.4rem;
        }
        .func-card p {
            color: var(--text-secondary);
            font-size: clamp(12.5px, 0.82vw, 13.5px);
        }

        /* 快捷分区标题 */
        .section-title {
            font-size: clamp(1.05rem, 1.6vw, 1.25rem);
            margin: 3rem 0 1.2rem;
            padding-left: 0.5rem;
            border-left: 4px solid var(--accent);
        }

        /* 快捷工具栏 */
        .tool-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
        }
        .tool-btn {
            padding: 0.6rem 1.2rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: clamp(13px, 0.88vw, 14px);
        }
        .tool-btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* 预留拓展区块 */
        .extend-box {
            background-color: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }
        .extend-box h3 {
            font-size: clamp(14.5px, 1.05vw, 16px);
            margin-bottom: 0.5rem;
        }
        .extend-box p {
            font-size: clamp(12.5px, 0.82vw, 13.5px);
        }

        /* 页脚 */
        .footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            text-align: center;
            color: var(--text-secondary);
            margin-top: 4rem;
            font-size: clamp(12.5px, 0.82vw, 13.5px);
        }

        /* 移动端精细适配 */
        @media (max-width: 768px) {
            .nav-container {
                height: 50px;
            }
            .nav-menu {
                gap: 0.5rem;
            }
            .nav-item a {
                padding: 0.35rem 0.55rem;
            }
            /* 优化手机端卡片最小宽度，不会过窄 */
            .func-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fas fa-cube"></i>
                <span>综合主站</span>
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="active">首页主站</a>
                </li>
                <li class="nav-item">
                    <a href="search.html">搜索中心</a>
                </li>
                <!-- 后续新增导航直接在这里加 <li> 标签即可 -->
                <li class="nav-item">
                    <a href="#">待添加页面</a>
                </li>
            </ul>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="container">
        <div class="page-title">
            <h1>功能聚合主站</h1>
            <p>统一入口 | 快速跳转所有站点与功能，深色护眼模式</p>
        </div>

        <!-- 核心功能卡片区 -->
        <h2 class="section-title">核心入口</h2>
        <div class="func-grid">
            <!-- 已有页面：index.html -->
            <a href="index.html" class="func-card">
                <div class="func-icon">
                    <i class="fas fa-home"></i>
                </div>
                <h3>主站首页</h3>
                <p>跳转至 index.html</p>
            </a>

            <!-- 已有页面：search.html -->
            <a href="search.html" class="func-card">
                <div class="func-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h3>搜索页面</h3>
                <p>跳转至 search.html</p>
            </a>

            <!-- 新增：MCPE函数生成器卡片 pemcpack.html -->
            <a href="pemcpack.html" class="func-card">
                <div class="func-icon">
                    <i class="fas fa-cubes"></i>
                </div>
                <h3>MCPE函数生成器</h3>
                <p>跳转至 pemcpack.html</p>
            </a>

            <!-- 预留空位卡片 -->

        </div>

        <!-- 快捷工具栏区域示例 -->
        <h2 class="section-title">快捷工具</h2>
        <div class="tool-bar">
            <a class="tool-btn"><i class="fas fa-wrench"></i>常用工具1</a>
            <a class="tool-btn"><i class="fas fa-file-code"></i>代码工具</a>
        </div>

        <!-- 拓展预留区域 -->
        <div class="extend-box">
            <h3>后续功能拓展区</h3>
            <p>后续新增功能卡片、页面可添加在上方网格内</p>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>综合聚合主站 © 深色主题 | 自适应多端访问</p>
    </footer>
</body>
</html>
