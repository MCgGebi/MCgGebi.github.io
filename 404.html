<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not found</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #3b8526;
            --border: #444;
            --text: #f0f0f0;
            --text-muted: #888;
        }

        body {
            margin: 0; min-height: 100vh;
            font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', 'Segoe UI', sans-serif;
            color: var(--text); overflow: hidden; position: relative;
            background: #1a1a1a;
        }

        .btn-base {
            height: 26px; border-radius: 4px; cursor: pointer;
            font-size: 12px; font-weight: 500; transition: all .2;
            display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
            font-family: inherit;
        }
        .btn-add { background: var(--accent); color: white; border: none; padding: 0 12px; }
        .btn-add:hover { opacity: .85; }
        .btn-back { background: none; border: 1px solid var(--border); color: #888; width: 36px; }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,133,38,.1); }

        .bg-image {
            position: fixed; inset: 0; background-size: cover; background-position: center;
            z-index: -2; opacity: 0; transition: opacity 1.2 ease-in-out;
        }
        .bg-image.loaded { opacity: 1; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: -1; }

        .cursor-glow {
            position: fixed; width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(59,133,38,0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%,-50%); z-index: 0; opacity: .5;
        }
        @media (hover:none) and (pointer:coarse) { .cursor-glow { display: none; } }

        .container {
            position: relative; z-index: 1; width: 90%; max-width: 560px;
            margin: 0 auto; padding: 30px 20px;
            display: flex; flex-direction: column; justify-content: center;
            min-height: 100vh; text-align: center;
        }

        .breadcrumb {
            position: fixed; top: 15px; right: 20px; font-size: 11px;
            color: var(--text-muted); display: flex; gap: 6px; z-index: 10;
        }
        .breadcrumb span { cursor: pointer; }
        .breadcrumb span:hover { color: var(--accent); }

        .error-code {
            font-size: clamp(72px,14vw,110px); font-weight: 900;
            color: var(--accent); text-shadow: 0 0 30px rgba(59,133,38,0.4);
            animation: float 4 ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        .quote-wrapper {
            margin: 25px 0 30px; min-height: 55px;
            opacity: 0; transform: translateY(10px);
            transition: opacity .6, transform .6;
        }
        .quote-wrapper.loaded { opacity: 1; transform: translateY(0); }
        .quote { font-size: 14px; line-height: 1.7; }
        .from { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

        .action-bar { display: flex; justify-content: center; gap: 8px; }

        footer {
            position: fixed; bottom: 15px; width: 100%;
            text-align: center; font-size: 11px; color: var(--text-muted);
        }

        .help-container { position: fixed; bottom: 12px; right: 20px; z-index: 20; }
        .help-trigger {
            width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border);
            background: transparent; color: var(--text-muted); font-size: 12px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .2; opacity: .6; font-family: inherit;
        }
        .help-trigger:hover { opacity: 1; border-color: var(--accent); color: var(--accent); background: rgba(59,133,38,.1); }
        .help-tooltip {
            position: absolute; bottom: 30px; right: 0; width: 180px; padding: 10px;
            background: rgba(20,20,20,.95); border: 1px solid var(--border); border-radius: 6px;
            font-size: 11px; line-height: 1.6; color: var(--text-muted); text-align: left;
            opacity: 0; visibility: hidden; transform: translateY(5px); transition: all .2 ease;
            pointer-events: none; font-family: inherit;
        }
        .help-container:hover .help-tooltip { opacity: 1; visibility: visible; transform: translateY(0); }
        .help-tooltip strong { color: var(--text); font-weight: 500; }

        .bottom-buttons {
            position: fixed; bottom: 15px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 19; pointer-events: none;
        }
        .left-buttons, .right-buttons {
            display: flex; gap: 8px; pointer-events: auto;
        }
        .right-buttons { margin-right: 35px; }

        .mini-btn {
            font-size: 10px; color: var(--text-muted); opacity: .4;
            background: none; border: none; cursor: pointer;
            padding: 2px 6px; border-radius: 2px; height: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            font-family: inherit; font-weight: 400;
            transition: opacity .2;
        }
        .mini-btn:hover { opacity: 1; color: var(--accent); background: rgba(59,133,38,.1); }
    </style>
</head>
<body>
    <div class="bg-image" id="bgImage"></div>
    <div class="overlay"></div>
    <div class="cursor-glow" id="glow"></div>

    <div class="breadcrumb">
        <span id="bHome" onclick="goHome()">首页</span> / <span id="bBack" onclick="goBack()">返回</span>
    </div>

    <div class="help-container">
        <div class="help-trigger">?</div>
        <div class="help-tooltip" id="helpTooltip"></div>
    </div>

    <div class="container">
        <div class="error-code">404</div>
        <div class="quote-wrapper" id="quoteWrapper">
            <div class="quote" id="hitokoto">正在检索数据...</div>
            <div class="from" id="from"></div>
        </div>
        <div class="action-bar">
            <button class="btn-base btn-back" id="btnBack" onclick="goBack()" title="返回 (Esc)">←</button>
            <button class="btn-base btn-add" id="btnPageRefresh" onclick="location.reload()">↻ 刷新</button>
        </div>
    </div>

    <div class="bottom-buttons">
        <div class="left-buttons">
            <button class="mini-btn" id="btnSource" onclick="openSource()">原图</button>
            <button class="mini-btn" id="btnContentRefresh" onclick="reloadAll()">刷新</button>
        </div>
        <div class="right-buttons">
            <button class="mini-btn" id="btnLang" onclick="toggleLang()">EN</button>
        </div>
    </div>

    <footer id="footer"></footer>

<script>
/* ===== i18n ===== */
const i18n = {
    zh: {
        footer: '© 2026 Your Site · 按 Esc 返回',
        fallback: '似乎迷失在了未知的空间里。',
        api: 'https://v1.hitokoto.cn/?c=i&c=j',
        help: `<strong>迷路了吗？</strong><br>• 按 <strong>Esc</strong> 返回<br>• 点击 <strong>←</strong> 回到上页<br>• 点击 <strong>↻</strong> 重载页面<br>• 点击 <strong>EN/中</strong> 切换语言`,
        bHome: '首页', bBack: '返回',
        btnSource: '原图', btnPageRefresh: '↻ 刷新',
        btnContentRefresh: '刷新',
        btnBackTitle: '返回 (Esc)',
        btnLang: 'EN'
    },
    en: {
        footer: '© 2026 Your Site · Press Esc to go back',
        fallback: 'It seems you\'re lost in the void.',
        api: 'https://api.quotable.io/random',
        help: `<strong>Lost?</strong><br>• Press <strong>Esc</strong> to go back<br>• Click <strong>←</strong> to previous page<br>• Click <strong>↻</strong> to reload page<br>• Click <strong>EN/中</strong> to switch language`,
        bHome: 'Home', bBack: 'Back',
        btnSource: 'Source', btnPageRefresh: '↻ Refresh',
        btnContentRefresh: 'Refresh',
        btnBackTitle: 'Back (Esc)',
        btnLang: '中'
    }
};

const enLocalQuotes = [
    { q: "Not all those who wander are lost.", a: "J.R.R. Tolkien" },
    { q: "The journey of a thousand miles begins with one step.", a: "Lao Tzu" },
    { q: "In the middle of difficulty lies opportunity.", a: "Albert Einstein" },
    { q: "What you seek is seeking you.", a: "Rumi" },
    { q: "Even the darkest night will end and the sun will rise.", a: "Victor Hugo" },
    { q: "Every page has an end. Yet we go on reading.", a: "" },
    { q: "Maybe it's not about the destination, but the detour.", a: "" },
];

function detectLang() {
    const saved = localStorage.getItem('lang');
    if (saved && i18n[saved]) return saved;
    const nav = (navigator.language || '').toLowerCase();
    if (nav.startsWith('zh')) return 'zh';
    return 'en';
}

let currentLang = detectLang();
let currentBgUrl = '';

function applyLang(l) {
    currentLang = l;
    localStorage.setItem('lang', l);
    const t = i18n[l];
    document.getElementById('btnLang').innerText = t.btnLang;
    document.getElementById('btnSource').innerText = t.btnSource;
    document.getElementById('btnPageRefresh').innerText = t.btnPageRefresh;
    document.getElementById('btnContentRefresh').innerText = t.btnContentRefresh;
    document.getElementById('btnBack').title = t.btnBackTitle;
    document.getElementById('bHome').innerText = t.bHome;
    document.getElementById('bBack').innerText = t.bBack;
    document.getElementById('footer').innerText = t.footer;
    document.getElementById('helpTooltip').innerHTML = t.help;
    loadHitokoto();
}

/* ===== 🆕 主源 loliapi(json) / 备源 lolicon.setu ===== */
function loadBackground() {
    const bg = document.getElementById('bgImage');
    bg.classList.remove('loaded');

    // 主源：loliapi 返 { imgurl: "直链" }
    const primaryApi = `https://www.loliapi.com/acg/?type=json&t=${Date.now()}`;
    // 备源：lolicon.setu v2，r18=0 安全线，num=1 单张，可加 tag
    // 例：?tag=原神&tag=ロリ&r18=0&num=1
    const backupApi = 'https://api.lolicon.app/setu/v2?r18=0&num=1';

    fetch(primaryApi)
        .then(r => r.json())
        .then(d => {
            const imgUrl = d.imgurl || d.url;
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                bg.style.backgroundImage = `url(${imgUrl})`;
                currentBgUrl = imgUrl;
                bg.classList.add('loaded');
            };
            img.onerror = () => { bg.style.backgroundImage = 'none'; };
            img.src = imgUrl;
        })
        .catch(() => {
            // 🆕 主源挂 → 切 lolicon.setu
            fetch(backupApi)
                .then(r => r.json())
                .then(d => {
                    // lolicon 返回 { data: [{ urls: { original } }] }
                    if (d.data && d.data.length > 0) {
                        const imgUrl = d.data[0].urls.original;
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            bg.style.backgroundImage = `url(${imgUrl})`;
                            currentBgUrl = imgUrl;
                            bg.classList.add('loaded');
                        };
                        img.onerror = () => { bg.style.backgroundImage = 'none'; };
                        img.src = imgUrl;
                    } else {
                        // lolicon 也空 → 安静退回纯色
                        bg.style.backgroundImage = 'none';
                    }
                })
                .catch(() => { bg.style.backgroundImage = 'none'; });
        });
}

/* ===== 带超时 fetch ===== */
function fetchWithTimeout(url, ms = 3000) {
    return Promise.race([
        fetch(url),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
    ]);
}

/* ===== 一言 / 英文名言 ===== */
async function loadHitokoto() {
    const w = document.getElementById('quoteWrapper'),
          q = document.getElementById('hitokoto'),
          f = document.getElementById('from');
    w.classList.remove('loaded');
    try {
        if (currentLang === 'zh') {
            const res = await fetch(i18n.zh.api);
            const d = await res.json();
            q.innerText = d.hitokoto;
            f.innerText = d.from ? `—— ${d.from}` : '';
        } else {
            const res = await fetchWithTimeout(i18n.en.api, 3000);
            const d = await res.json();
            q.innerText = d.content || i18n.en.fallback;
            f.innerText = d.author ? `— ${d.author}` : '';
        }
    } catch {
        if (currentLang === 'en') {
            const pick = enLocalQuotes[Math.floor(Math.random() * enLocalQuotes.length)];
            q.innerText = pick.q;
            f.innerText = pick.a ? `— ${pick.a}` : '';
        } else {
            q.innerText = i18n.zh.fallback;
            f.innerText = '';
        }
    }
    void w.offsetWidth;
    w.classList.add('loaded');
}

/* ===== 交互 ===== */
function reloadAll() { loadBackground(); loadHitokoto(); }
function openSource() { if(currentBgUrl) window.open(currentBgUrl, '_blank', 'noopener'); }
function goHome() { location.href='/'; }
function goBack() { document.referrer ? history.back() : location.href='/'; }
function toggleLang() { applyLang(currentLang==='zh'?'en':'zh'); }

document.addEventListener('keydown', e => { if(e.key==='Escape') goBack(); });
document.addEventListener('mousemove', e => {
    document.getElementById('glow').style.left = e.clientX+'px';
    document.getElementById('glow').style.top = e.clientY+'px';
});

/* Init */
applyLang(currentLang);
loadBackground();
setInterval(loadHitokoto, 8000);
</script>
</body>
</html>
