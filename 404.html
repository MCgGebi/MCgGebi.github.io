<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    
    <style>
        :root {
            --accent: #3b8526;
            --border: #444;
            --bg: #1a1a1a;
            --text: #f0f0f0;
            --text-muted: #888;
        }

        .btn-base {
            height: 26px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 12px;
        }
        .btn-add:hover { opacity: .85; }

        .btn-back {
            background: none;
            border: 1px solid var(--border);
            color: #888;
            width: 36px;
            padding: 0;
        }
        .btn-back:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(59,133,38,.1);
        }

        body {
            background: var(--bg);
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(59, 133, 38, 0.08), transparent 70%);
            animation: pulse 6s infinite alternate;
            z-index: 0;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .error-code {
            font-size: clamp(80px, 15vw, 120px);
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 40px rgba(59, 133, 38, 0.3);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .quote-wrapper {
            margin: 20px 0 30px;
            min-height: 60px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .quote-wrapper.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .quote {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 8px;
        }
        .from {
            font-size: 11px;
            color: var(--text-muted);
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-code">404</div>

    <div class="quote-wrapper" id="quoteWrapper">
        <div class="quote" id="hitokoto">正在检索数据...</div>
        <div class="from" id="from"></div>
    </div>

    <div class="action-bar">
        <button class="btn-base btn-back" onclick="goBack()" title="返回 (Esc)">←</button>
        <button class="btn-base btn-add" onclick="reloadQuote()">↻ 刷新</button>
    </div>
</div>

<footer>© 2026 Your Site</footer>

<script>
let timer = null;
const INTERVAL = 8000;

function goBack() {
    if (document.referrer && document.referrer !== location.href) {
        history.back();
    } else {
        location.href = '/';
    }
}

async function loadHitokoto() {
    const wrapper = document.getElementById('quoteWrapper');
    const quoteEl = document.getElementById('hitokoto');
    const fromEl = document.getElementById('from');

    wrapper.classList.remove('loaded');

    try {
        const res = await fetch('https://v1.hitokoto.cn/?c=i&c=j');
        const data = await res.json();
        quoteEl.innerText = data.hitokoto;
        fromEl.innerText = data.from ? `—— ${data.from}` : '';
        void wrapper.offsetWidth;
        wrapper.classList.add('loaded');
    } catch (err) {
        quoteEl.innerText = '似乎迷失在了未知的空间里。';
        fromEl.innerText = '—— 系统';
        wrapper.classList.add('loaded');
    }
}

function reloadQuote() {
    clearInterval(timer);
    loadHitokoto();
    timer = setInterval(loadHitokoto, INTERVAL);
}

// ESC 键监听
document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
        goBack();
    }
});

// 初始化
loadHitokoto();
timer = setInterval(loadHitokoto, INTERVAL);
</script>

</body>
</html>
